<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapple 🐾 Arbor Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', 'Segoe UI', sans-serif; background: #1a0a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }

  /* Paw prints floating bg */
  body::before { content: '🐾🐾🐾🐾🐾🐾🐾🐾🐾🐾🐾🐾'; font-size: 1.5rem; opacity: 0.04; position: fixed; top: 0; left: 0; width: 100%; word-break: break-all; letter-spacing: 12px; line-height: 3rem; pointer-events: none; z-index: 0; }

  h1 { font-size: 2rem; font-weight: 900; letter-spacing: 3px; color: #d97bff; margin: 12px 0 0; text-transform: uppercase; position: relative; z-index: 1; }
  .subtitle { font-size: 0.8rem; color: #a06acc; letter-spacing: 2px; margin-bottom: 10px; position: relative; z-index: 1; }

  #category-box { background: #2a0e4a; border: 2px solid #d97bff; border-radius: 20px; padding: 14px 28px; text-align: center; margin: 10px 0; min-width: 280px; position: relative; z-index: 1; }
  #category-label { font-size: 0.7rem; letter-spacing: 2px; color: #d97bff; text-transform: uppercase; }
  #category-text { font-size: 1.45rem; font-weight: 900; margin-top: 4px; color: #fff; }

  #timer-ring { position: relative; width: 110px; height: 110px; margin: 8px auto; z-index: 1; }
  #timer-ring svg { transform: rotate(-90deg); }
  #timer-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; font-weight: 900; color: #d97bff; }

  #player-banner { font-size: 0.95rem; letter-spacing: 1px; color: #b08acc; margin: 2px 0 10px; position: relative; z-index: 1; }
  #player-banner span { color: #fff; font-weight: 900; font-size: 1.1rem; }

  #wheel { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; max-width: 340px; width: 100%; margin: 0 auto 12px; position: relative; z-index: 1; }
  .letter-btn { background: #2d0f54; border: 2px solid #7b3fa8; border-radius: 10px; color: #e8b4ff; font-size: 1rem; font-weight: 900; padding: 10px 0; cursor: pointer; transition: background 0.12s, transform 0.1s; user-select: none; touch-action: manipulation; }
  .letter-btn:active { transform: scale(0.88); background: #d97bff; color: #1a0a2e; }
  .letter-btn.used { background: #1a1a1a; border-color: #333; color: #444; cursor: not-allowed; }
  .letter-btn.used:active { transform: none; background: #1a1a1a; }

  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; position: relative; z-index: 1; }
  .ctrl-btn { background: #2d0f54; border: 2px solid #7b3fa8; border-radius: 12px; color: #e8b4ff; font-size: 0.85rem; font-weight: 700; padding: 10px 16px; cursor: pointer; transition: background 0.15s; }
  .ctrl-btn:hover, .ctrl-btn:active { background: #7b3fa8; color: #fff; }
  .ctrl-btn.danger { border-color: #e74c8c; color: #ffb3d1; }
  .ctrl-btn.danger:hover { background: #e74c8c; color: #fff; }
  .ctrl-btn.success { border-color: #27c96a; color: #a3ffcd; }
  .ctrl-btn.success:hover { background: #27c96a; color: #fff; }

  #players-section { width: 100%; max-width: 340px; margin-top: 6px; position: relative; z-index: 1; }
  #players-section h3 { font-size: 0.7rem; letter-spacing: 2px; color: #d97bff; text-transform: uppercase; margin-bottom: 8px; text-align: center; }
  #players-list { display: flex; flex-direction: column; gap: 6px; }
  .player-card { background: #2a0e4a; border: 2px solid #4a2070; border-radius: 12px; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; font-weight: 700; }
  .player-card.active { border-color: #d97bff; background: #3d1568; box-shadow: 0 0 12px #d97bff44; }
  .player-card.eliminated { opacity: 0.35; text-decoration: line-through; }

  #alert-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #d97bff, #ff6eb4); color: #fff; padding: 14px 28px; border-radius: 16px; font-weight: 900; font-size: 1.1rem; display: none; z-index: 999; text-align: center; min-width: 220px; box-shadow: 0 4px 20px #d97bff66; }

  #setup-screen { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-top: 10px; width: 100%; max-width: 340px; position: relative; z-index: 1; }
  #setup-screen h2 { color: #d97bff; letter-spacing: 2px; font-weight: 900; }
  #setup-players-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .setup-player { background: #2a0e4a; border: 2px solid #4a2070; border-radius: 12px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
  .remove-player { cursor: pointer; color: #ff6eb4; font-size: 1.1rem; background: none; border: none; }
  #setup-add-row { display: flex; gap: 8px; width: 100%; }
  #setup-name-input, #timer-select { background: #2a0e4a; border: 2px solid #4a2070; border-radius: 12px; color: #fff; font-size: 0.95rem; padding: 10px 12px; width: 100%; font-family: inherit; font-weight: 700; }
  #setup-name-input:focus, #timer-select:focus { outline: none; border-color: #d97bff; }

  #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; }

  .mascot { font-size: 2rem; margin: 0 4px; animation: wag 1.5s ease-in-out infinite alternate; display: inline-block; }
  @keyframes wag { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }
</style>
</head>
<body>
<h1>🐾 Tapple</h1>
<div class="subtitle">ARBOR EDITION &nbsp;·&nbsp; <span class="mascot">🐕</span> Oreo &amp; Cookie <span class="mascot">🐕</span></div>
<div id="alert-box"></div>

<!-- SETUP -->
<div id="setup-screen">
  <h2>🎮 NEW GAME</h2>
  <div style="width:100%">
    <label style="font-size:.7rem;letter-spacing:2px;color:#d97bff;text-transform:uppercase;display:block;margin-bottom:6px;">⏱ Timer</label>
    <select id="timer-select">
      <option value="10" selected>10 seconds (hard!)</option>
      <option value="15">15 seconds</option>
      <option value="20">20 seconds (easy)</option>
      <option value="30">30 seconds (chill)</option>
    </select>
  </div>
  <div style="width:100%">
    <label style="font-size:.7rem;letter-spacing:2px;color:#d97bff;text-transform:uppercase;display:block;margin-bottom:8px;">👥 Players</label>
    <div id="setup-players-list"></div>
    <div id="setup-add-row" style="margin-top:8px;">
      <input id="setup-name-input" type="text" placeholder="Player name…" maxlength="20" />
      <button class="ctrl-btn success" onclick="setupAddPlayer()">Add</button>
    </div>
  </div>
  <button class="ctrl-btn success" style="width:100%;padding:14px;font-size:1.1rem;border-radius:14px;" onclick="startGame()">🐾 Start Game!</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div id="category-box">
    <div id="category-label">🎯 Category</div>
    <div id="category-text">Loading…</div>
  </div>
  <div id="timer-ring">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="46" stroke="#2a0e4a" stroke-width="8" fill="none"/>
      <circle id="timer-arc" cx="55" cy="55" r="46" stroke="#d97bff" stroke-width="8" fill="none" stroke-dasharray="289" stroke-dashoffset="0" stroke-linecap="round"/>
    </svg>
    <div id="timer-num">10</div>
  </div>
  <div id="player-banner">Current: <span id="current-player-name">—</span></div>
  <div id="wheel"></div>
  <div class="btn-row">
    <button class="ctrl-btn danger" onclick="eliminatePlayer()">❌ Out!</button>
    <button class="ctrl-btn" onclick="newCategory()">🔀 New Category</button>
    <button class="ctrl-btn" onclick="nextTurn()">⏭ Skip</button>
  </div>
  <div class="btn-row">
    <button class="ctrl-btn danger" onclick="endGame()">🏁 End Game</button>
  </div>
  <div id="players-section">
    <h3>🐾 Players</h3>
    <div id="players-list"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  // 🐾 Oreo & Cookie dog themed
  "Things dogs love","Things you find at a dog park","Dog breeds","Things dogs do when excited",
  "Things you need to take care of a dog","Black and white things","Things that are black",
  "Tricks you can teach a dog","Things dogs hate","Snacks dogs can eat",
  // 🚴 Verity/Arbor life
  "Things you bring on a bike ride","Places to ride a bike","Things you wear for sports",
  "Things you see on a nature trail","Things in a backpack for hiking",
  "Soccer player names","Soccer moves","Things at a soccer game",
  "Things runners do","Running gear you need","Things at a race finish line",
  "Things you do outside","Summer outdoor activities","Things at a neighborhood park",
  // 🏫 School / kid life
  "Things in a school locker","School subjects","Things in art class",
  "Things at recess","Things in a lunchbox","Things you do after school",
  "Homework excuses","Things in a pencil case",
  // 🎮 Fun / general
  "Animals","Things at a beach","Foods you eat for breakfast","Movies",
  "Things in a kitchen","Countries","Things that are red","Musical instruments",
  "TV shows","Things that fly","Vegetables","Fruits","Clothing items",
  "Candy brands","Cartoon characters","Superheroes","Board games",
  "Ice cream flavors","Halloween costumes","Pasta types","Things at a carnival",
  "Things with wheels","Reptiles","Types of weather","Fast food restaurants",
  "Video game characters","Dance styles","Things in outer space",
  "Things that glow","Types of music","Famous buildings",
  "Things that are soft","Things made of wood","Flowers","Dog names (famous)",
  "Things you find at a pet store","Things that are fluffy","Things that bounce",
  "Words that mean fast","Things you do on a snow day","Things that are purple",
  "Things at a birthday party","Things on a pizza","Things in your bedroom",
  "Baby animals","Things at a swimming pool","Words that rhyme with dog",
  "Things that are cute","Things in a treehouse","Things at a sleepover",
];

let players = [], currentIndex = 0, timerSeconds = 10, timeLeft = 10;
let timerInterval = null, usedLetters = new Set(), setupPlayers = [];
const ARC_CIRC = 2 * Math.PI * 46;
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

function renderSetupPlayers() {
  const el = document.getElementById('setup-players-list');
  el.innerHTML = '';
  setupPlayers.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'setup-player';
    div.innerHTML = '<span>' + name + '</span><button class="remove-player" onclick="setupRemovePlayer(' + i + ')">✕</button>';
    el.appendChild(div);
  });
}
function setupAddPlayer() {
  const inp = document.getElementById('setup-name-input');
  const name = inp.value.trim();
  if (!name) return;
  setupPlayers.push(name);
  inp.value = ''; renderSetupPlayers(); inp.focus();
}
document.getElementById('setup-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') setupAddPlayer(); });
function setupRemovePlayer(i) { setupPlayers.splice(i, 1); renderSetupPlayers(); }

function startGame() {
  if (setupPlayers.length < 2) { showAlert('Add at least 2 players! 🐾'); return; }
  timerSeconds = parseInt(document.getElementById('timer-select').value);
  players = setupPlayers.map(name => ({ name, eliminated: false }));
  currentIndex = 0;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  buildWheel(); newCategory(); renderPlayers(); startTimer();
}

function buildWheel() {
  const wheel = document.getElementById('wheel');
  wheel.innerHTML = '';
  LETTERS.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn'; btn.id = 'btn-' + letter; btn.textContent = letter;
    btn.onclick = () => pressLetter(letter);
    wheel.appendChild(btn);
  });
}

function pressLetter(letter) {
  if (usedLetters.has(letter)) return;
  usedLetters.add(letter);
  document.getElementById('btn-' + letter).classList.add('used');
  nextTurn();
}

function updateTimerUI() {
  const pct = timeLeft / timerSeconds;
  const arc = document.getElementById('timer-arc');
  arc.style.strokeDashoffset = ARC_CIRC * (1 - pct);
  arc.style.stroke = pct > 0.5 ? '#d97bff' : pct > 0.25 ? '#ff9f43' : '#ff6eb4';
  document.getElementById('timer-num').textContent = timeLeft;
}

function startTimer() {
  clearInterval(timerInterval); timeLeft = timerSeconds; updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--; updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timerInterval); timerExpired(); }
  }, 1000);
}

function timerExpired() {
  const p = activePlayers();
  if (!p.length) return;
  const name = p[currentIndex % p.length].name;
  showAlert('🐾 Woof! ' + name + ' is out!', 3000);
  players.find(pl => pl.name === name).eliminated = true;
  renderPlayers(); checkWin();
  if (activePlayers().length > 1) { currentIndex = currentIndex % activePlayers().length; renderPlayers(); startTimer(); }
}

function activePlayers() { return players.filter(p => !p.eliminated); }

function renderPlayers() {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  const active = activePlayers();
  const curName = active.length ? active[currentIndex % active.length].name : '';
  players.forEach(p => {
    const div = document.createElement('div');
    div.className = 'player-card' + (p.eliminated ? ' eliminated' : '') + (!p.eliminated && p.name === curName ? ' active' : '');
    div.innerHTML = '<span>' + (p.name === curName && !p.eliminated ? '🐾 ' : '') + p.name + '</span>';
    list.appendChild(div);
  });
  document.getElementById('current-player-name').textContent = curName || '—';
}

function nextTurn() {
  const active = activePlayers();
  if (!active.length) return;
  currentIndex = (currentIndex + 1) % active.length;
  renderPlayers(); startTimer();
}

function eliminatePlayer() {
  const active = activePlayers();
  if (active.length <= 2) { showAlert("Can't eliminate — almost done! 🐕"); return; }
  const cur = active[currentIndex % active.length];
  players.find(p => p.name === cur.name).eliminated = true;
  renderPlayers(); checkWin();
  currentIndex = currentIndex % activePlayers().length;
  renderPlayers(); startTimer();
}

function checkWin() {
  const active = activePlayers();
  if (active.length === 1) {
    clearInterval(timerInterval);
    showAlert('🏆🐾 ' + active[0].name + ' WINS! Good boy! 🐕', 6000);
  }
}

function newCategory() {
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  document.getElementById('category-text').textContent = cat;
  usedLetters.clear();
  LETTERS.forEach(l => { const b = document.getElementById('btn-' + l); if (b) b.classList.remove('used'); });
  startTimer();
}

let alertTimeout;
function showAlert(msg, dur) {
  dur = dur || 2500;
  const box = document.getElementById('alert-box');
  box.textContent = msg; box.style.display = 'block';
  clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => box.style.display = 'none', dur);
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  setupPlayers = players.map(p => p.name);
  renderSetupPlayers();
}

setupPlayers = ['Verity', 'Player 2'];
renderSetupPlayers();
</script>
</body>
</html>
